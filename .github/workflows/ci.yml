name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint (flake8 — non-blocking)
        working-directory: backend
        continue-on-error: true
        run: flake8 . --max-line-length=120 --extend-ignore=E203,W503
      - name: Import smoke test
        working-directory: backend
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: test
          GEMINI_API_KEY: test
          CORS_ORIGINS: http://localhost:3000
        run: python -c "import server; print('server imports OK')"
      - name: Pytest (if tests exist)
        working-directory: backend
        run: |
          if compgen -G "test_*.py" > /dev/null || compgen -G "tests/*.py" > /dev/null; then
            pytest -q
          else
            echo "no tests yet — skipping"
          fi

  frontend:
    name: Frontend (CRA / craco)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps
      - name: Build
        working-directory: frontend
        env:
          CI: 'false'  # treat warnings as warnings, not errors
        run: npm run build

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for tracked secrets
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)\.env($|\.)' | grep -v '\.example$' | grep -v '\.sample$'; then
            echo "::error::Tracked .env file detected"
            exit 1
          fi
          if git grep -nE '(sk_live_|AKIA[0-9A-Z]{16}|-----BEGIN (RSA|EC|OPENSSH) PRIVATE KEY-----)' -- . ':!*.example' ':!*.md'; then
            echo "::error::Looks like a real secret was committed"
            exit 1
          fi
