version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      fastapi:
        patterns:
          - "fastapi"
          - "starlette"
          - "uvicorn"
          - "pydantic*"
      google-ai:
        patterns:
          - "google-ai-*"
          - "google-generativeai"
          - "google-genai"
          - "google-api-*"
          - "google-auth*"
      aws:
        patterns:
          - "boto3"
          - "botocore"
          - "s3transfer"
      lint-test:
        patterns:
          - "pytest"
          - "flake8"
          - "black"
          - "mypy"
          - "isort"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      radix:
        patterns:
          - "@radix-ui/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router*"
      capacitor:
        patterns:
          - "@capacitor/*"

  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
